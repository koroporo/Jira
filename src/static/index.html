<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koroporo Jira - Task Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .priority-4 { border-left: 5px solid red; }
        .priority-0 { border-left: 5px solid gray; }
        .progress { height: 25px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Koroporo Jira</span>
    </div>
</nav>

<div class="container">
    <!-- Requirement 3.3: Function/Procedure Demonstration -->
    <section id="milestone-section" class="mb-5">
        <h3>🚀 Milestone Progress (Function: calculate_milestone_progress)</h3>
        <div id="milestone-list" class="row"></div>
    </section>

    <hr>

    <!-- Requirement 3.2: Data List Interface -->
    <section id="task-section">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>📋 Task Management</h3>
            <button class="btn btn-primary" onclick="showCreateModal()">+ Create New Task</button>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <div class="row g-2 mb-3">
                    <div class="col-md-4">
                        <input type="text" id="searchInput" class="form-control" placeholder="Search tasks...">
                    </div>
                </div>
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Priority</th>
                            <th>Assignee</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody"></tbody>
                </table>
            </div>
        </div>
    </section>
</div>

<!-- Task Modal (Insert/Update) -->
<div class="modal fade" id="taskModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Create Task</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="taskForm">
                    <input type="hidden" id="taskId">
                    <div class="mb-3">
                        <label class="form-label">Title*</label>
                        <input type="text" id="title" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea id="description" class="form-control"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Priority (0-4)</label>
                            <input type="number" id="priority" class="form-control" min="0" max="4" value="0">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Status ID</label>
                            <input type="number" id="statusId" class="form-control" value="1">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveTask()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
