<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koroporo Jira - Control Center</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">   
 <style>
          :root {
    --jira-blue: #0052CC;
    --jira-dark: #172B4D;
    --jira-bg: #F4F5F7;
}
body { background-color: var(--jira-bg); }
.navbar { background-color: var(--jira-dark) !important; }
.kpi-card { border: none; border-top: 4px solid var(--jira-blue); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
.table thead th { color: #6B778C; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body>

<!-- LOGIN SECTION -->
<div id="loginSection" class="container" style="max-width: 400px;">
    <div class="card shadow p-5 text-center">
        <h3 class="fw-bold mb-4">KoroTask - Mockup</h3>
        <input type="number" id="loginId" class="form-control mb-3 text-center" placeholder="Enter Profile ID">
        <button class="btn btn-primary w-100" onclick="handleLogin()">Login</button>
    </div>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent" style="display: none;">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">KoroTask - Mockup</span>
            <div class="text-white small">
                <span id="userNameDisplay" class="me-3"></span>
                <button class="btn btn-sm btn-outline-danger" onclick="handleLogout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        
        <!-- 1. STAFF DASHBOARD SECTION (KPI Bar) -->
        <div class="row mb-4">
            <div class="col-12"><h5 class="fw-bold">👤 My Status</h5></div>
            <div id="staffReportContainer" class="row g-3">
                <!-- script.js will inject cards here -->
                <div class="col-md-4">
                    <div class="card p-3">
                        <label class="text-muted small">Profile ID</label>
                        <input type="number" id="staffProfileId" class="form-control form-control-sm" placeholder="Enter ID to view stats">
                        <button class="btn btn-sm btn-link p-0 text-start" onclick="loadStaffReport()">Refresh Stats</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2. TASK MANAGEMENT SECTION -->
        <div class="row mb-4">
            <div class="col-12 d-flex justify-content-between">
                <h5 class="fw-bold">📋 Task Management</h5>
                <button class="btn btn-sm btn-primary" onclick="showCreateModal()">+ New Task</button>
            </div>
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <!-- Filters Row -->
                        <div class="row g-2 mb-3 align-items-end">
                            <div class="col-md-4">
                                <label class="small fw-bold">Search</label>
                                <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Keyword...">
                            </div>
                            <div class="col-md-2">
                                <label class="small fw-bold">Project</label>
                                <input type="number" id="projectFilter" class="form-control form-control-sm" placeholder="ID">
                            </div>
                            <div class="col-md-3">
                                <label class="small fw-bold">Status</label>
                                <select id="statusFilter" class="form-select form-select-sm">
                                    <option value="">All Statuses</option>
                                    <option value="1">To Do</option>
                                    <option value="2">In Progress</option>
                                    <option value="4">Done</option>
                                </select>
                            </div>
                            <div class="col-md-3 d-flex gap-1">
                                <button class="btn btn-sm btn-primary flex-fill" onclick="loadTasks()">Apply</button>
                                <button class="btn btn-sm btn-outline-secondary flex-fill" onclick="resetFilters()">Reset</button>
                            </div>
                        </div>
                        <!-- Table -->
                        <div class="table-responsive">
                            <table class="table table-sm table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th><th>Title</th><th>Project</th><th>Parent</th><th>Assignee</th><th>Status</th><th>Due</th><th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="taskTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 3. ASSIGNEE PERFORMANCE SECTION -->
        <div class="row">
            <div class="col-12"><h5 class="fw-bold">📈 Assignee Performance</h5></div>
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <div class="row g-2 mb-3 align-items-end">
                            <div class="col-md-3">
                                <label class="small fw-bold">Project ID *</label>
                                <input type="number" id="performanceProjectId" class="form-control form-control-sm">
                            </div>
                            <div class="col-md-2">
                                <label class="small fw-bold">Min Tasks</label>
                                <input type="number" id="performanceMinTasks" class="form-control form-control-sm" value="0">
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-sm btn-outline-primary w-100" onclick="loadPerformanceReport()">Analyze</button>
                            </div>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-sm table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th>Staff Name</th><th>Project</th><th>Assigned</th><th>Completed</th><th>Rate</th>
                                    </tr>
                                </thead>
                                <tbody id="performanceTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL -->
<!-- TASK MODAL -->
<div class="modal fade" id="taskModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content border-0 shadow-lg">
            
            <!-- Header -->
            <div class="modal-header bg-white border-bottom-0 pb-0">
                <h5 class="fw-bold text-dark mb-0" id="modalTitle">Create New Task</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body py-4">
                <form id="taskForm">
                    <input type="hidden" id="taskId">

                    <!-- SECTION: BASIC INFO -->
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted text-uppercase mb-2">Basic Information</label>
                        <div class="bg-light p-3 rounded-3">
                            <div class="mb-3">
                                <label class="form-label fw-semibold small">Title *</label>
                                <input type="text" id="title" class="form-control border-0 shadow-sm" placeholder="What needs to be done?" required>
                            </div>
                            <div class="mb-0">
                                <label class="form-label fw-semibold small">Description</label>
                                <textarea id="description" class="form-control border-0 shadow-sm" rows="3" placeholder="Add more details..."></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- SECTION: CLASSIFICATION & STATUS -->
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted text-uppercase mb-2">Classification</label>
                        <div class="row g-3">
                            <div class="col-md-5">
                                <label class="form-label fw-semibold small">Task Type</label>
                                <select id="taskType" class="form-select border-0 shadow-sm" onchange="toggleTypeDetail()">
                                    <option value="Task">Task</option>
                                    <option value="Story">Story</option>
                                    <option value="Epic">Epic</option>
                                    <option value="Bug">Bug</option>
                                </select>
                            </div>
                            <div class="col-md-4" id="typeDetailContainer" style="display: none;">
                                <label id="typeDetailLabel" class="form-label fw-semibold small">Detail</label>
                                <input type="text" id="typeDetail" class="form-control border-0 shadow-sm">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold small">Priority</label>
                                <input type="number" id="priority" class="form-control border-0 shadow-sm" value="0" min="0">
                            </div>
                        </div>


                    </div>
                 
                    <div class="col-md-4">
                        <label class="form-label fw-semibold small">Milestone ID</label>
                        <input type="number" id="milestoneId" class="form-control border-0 shadow-sm" placeholder="ID">
                    </div>

                    <!-- SECTION: ASSIGNMENT -->
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted text-uppercase mb-2">Assignment</label>
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold small">Project ID *</label>
                                <input type="number" id="projectId" class="form-control border-0 shadow-sm" placeholder="ID" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold small">Assignee ID</label>
                                <input type="number" id="assigneeId" class="form-control border-0 shadow-sm" placeholder="ID">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold small">Status ID</label>
                                <input type="number" id="statusId" class="form-control border-0 shadow-sm" value="1">
                            </div>
                        </div>
                    </div>

                    <!-- SECTION: SCHEDULING -->
                    <div>
                        <label class="form-label small fw-bold text-muted text-uppercase mb-2">Scheduling & Hierarchy</label>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold small">Parent Task ID</label>
                                <input type="number" id="parentTaskId" class="form-control border-0 shadow-sm" placeholder="ID">
                                <div class="form-text small">Leave blank for top-level tasks.</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold small">Due Date</label>
                                <input type="datetime-local" id="dueDate" class="form-control border-0 shadow-sm">
                            </div>
                        </div>
                    </div>

                </form>
            </div>

            <!-- Footer -->
            <div class="modal-footer border-top-0 px-4 pb-4">
                <button type="button" class="btn btn-outline-secondary px-4 border-0" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary px-5 shadow-sm" onclick="saveTask()">Save Task</button>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
