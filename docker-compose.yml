services:
  db:
    image: mysql:8.0
    container_name: mysql_btl2
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: db
    ports:
      - "3307:3306"
    volumes:
      - ./database/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/02_data.sql:/docker-entrypoint-initdb.d/02_data.sql
      - ./database/03_procedures.sql:/docker-entrypoint-initdb.d/03_procedures.sql
      - ./database/04_triggers.sql:/docker-entrypoint-initdb.d/04_triggers.sql
      - ./database/05_functions.sql:/docker-entrypoint-initdb.d/05_functions.sql